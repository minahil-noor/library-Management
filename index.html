<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Library System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:#fff;
}

/* NAV */
header{
    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(10px);
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

header h1{
    color:#00f2ff;
    font-size:18px;
}

nav a{
    color:#fff;
    text-decoration:none;
    margin:0 12px;
    font-size:14px;
}

nav a:hover{
    color:#00f2ff;
}

/* SECTION */
.section{
    padding:50px 20px;
    text-align:center;
}

h2{
    color:#00f2ff;
    margin-bottom:20px;
}

/* DASHBOARD */
.stats{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    padding:25px;
    border-radius:15px;
    min-width:180px;
}

.card h3{
    color:#00f2ff;
    font-size:28px;
}

/* INPUT */
input, select{
    padding:10px;
    border-radius:8px;
    border:none;
    margin:5px;
    width:200px;
}

/* BOOKS */
.books-list{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
    padding:0 20px;
}

.book-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
}

.book-card h3{
    color:#00f2ff;
}

button{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    border-radius:8px;
    background:#00f2ff;
    color:#000;
    cursor:pointer;
    font-weight:600;
}

/* CONTACT */
.contact-box{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
    display:inline-block;
    margin-top:20px;
}

a{
    color:#00f2ff;
    text-decoration:none;
}
</style>
</head>

<body>

<header>
    <h1>?? Premium Library System</h1>
    <nav>
        <a href="#dashboard">Dashboard</a>
        <a href="#books">Books</a>
        <a href="#add">Add Book</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- DASHBOARD -->
<section id="dashboard" class="section">
<h2>Dashboard</h2>
<div class="stats">
    <div class="card">
        <h3 id="totalBooks">0</h3>
        <p>Total Books</p>
    </div>
</div>
</section>

<!-- BOOKS -->
<section id="books" class="section">
<h2>Books Collection</h2>

<input type="text" id="search" placeholder="Search book...">

<select id="categoryFilter">
    <option value="All">All Categories</option>
    <option value="Fiction">Fiction</option>
    <option value="CS">Computer Science</option>
    <option value="History">History</option>
</select>

<div class="books-list" id="booksList"></div>
</section>

<!-- ADD -->
<section id="add" class="section">
<h2>Add Book</h2>

<input type="text" id="title" placeholder="Book Title">
<input type="text" id="author" placeholder="Author">
<input type="number" id="year" placeholder="Year">

<select id="category">
    <option value="Fiction">Fiction</option>
    <option value="CS">Computer Science</option>
    <option value="History">History</option>
</select>

<br>
<button onclick="addBook()">Add Book</button>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
<h2>Contact</h2>

<div class="contact-box">
    <p>Email:</p>
    <a href="mailto:minahil27mano@gmail.com">
        minahil27mano@gmail.com
    </a>
</div>
</section>

<script>

let books = [];

function addBook(){
    let title = document.getElementById("title").value;
    let author = document.getElementById("author").value;
    let year = document.getElementById("year").value;
    let category = document.getElementById("category").value;

    books.push({title,author,year,category});
    render(books);
}

function render(data){
    let list = document.getElementById("booksList");
    let total = document.getElementById("totalBooks");

    list.innerHTML = "";
    total.textContent = data.length;

    data.forEach((b,i)=>{
        list.innerHTML += `
        <div class="book-card">
            <h3>${b.title}</h3>
            <p>${b.author}</p>
            <p>${b.year}</p>
            <p style="color:#00f2ff">${b.category}</p>
            <button onclick="removeBook(${i})">Remove</button>
        </div>
        `;
    });
}

function removeBook(i){
    books.splice(i,1);
    render(books);
}

// SEARCH + FILTER
document.getElementById("search").addEventListener("input",filter);
document.getElementById("categoryFilter").addEventListener("change",filter);

function filter(){
    let search = document.getElementById("search").value.toLowerCase();
    let cat = document.getElementById("categoryFilter").value;

    let filtered = books.filter(b=>{
        return (b.title.toLowerCase().includes(search)) &&
        (cat==="All" || b.category===cat);
    });

    render(filtered);
}

</script>

</body>
</html>
